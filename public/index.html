<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #f830c3, #2a5298);
  display: flex; justify-content: center; align-items: center;
  height: 100vh;
}
.card {
  background: white; padding: 30px; border-radius: 10px;
  width: 300px; text-align: center;
}
input, button {
  width: 100%; padding: 10px; margin: 8px 0;
}
button { background: #2a5298; color: white; border: none; }
a { font-size: 14px; }
</style>
</head>
<body>

<div class="card">
  <h2>🔐 Login</h2>
  <input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <a href="forgot.html">ลืมรหัสผ่าน?</a>
  <a href="register.html">สมัครสมาชิก</a>
</div>

<script>
const API = "https://room-booking-api-ca1g.onrender.com";

async function login() {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = passwordInput.value;

  const res = await fetch(API + "/api/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("user", JSON.stringify(data));
    window.location = "dashboard.html";
  } else {
    alert(data.error);
  }
}

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
</script>

</body>
</html>
