<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(135deg, #0f172a, #020617);
}

/* glow effect */
.glow {
  box-shadow: 0 0 20px rgba(56,189,248,0.4);
}

/* smooth animation */
.fade {
  animation: fadeIn 0.7s ease;
}
@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1;}
}
</style>

</head>

<body class="flex items-center justify-center h-screen text-white">

<div class="fade backdrop-blur-xl bg-white/10 p-8 rounded-2xl shadow-2xl w-80 glow">

<h2 class="text-3xl font-bold text-center mb-6 text-cyan-400">
  🏨 Login
</h2>

<input id="email" placeholder="Email"
 class="w-full p-3 mb-3 rounded-lg bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-cyan-400">

<input id="password" type="password" placeholder="Password"
 class="w-full p-3 mb-4 rounded-lg bg-white/10 border border-white/20 focus:ring-2 focus:ring-cyan-400">

<button onclick="login()"
 class="w-full py-3 rounded-lg bg-gradient-to-r from-cyan-400 to-blue-500 hover:scale-105 transition transform font-bold">
 Login
</button>

<div class="text-center my-4 text-gray-300">OR</div>

<input id="username" placeholder="Username"
 class="w-full p-3 mb-2 rounded-lg bg-white/10 border border-white/20">

<input id="email2" placeholder="Email"
 class="w-full p-3 mb-2 rounded-lg bg-white/10 border border-white/20">

<input id="password2" type="password" placeholder="Password"
 class="w-full p-3 mb-3 rounded-lg bg-white/10 border border-white/20">

<button onclick="register()"
 class="w-full py-3 rounded-lg bg-green-500 hover:bg-green-600 transition font-bold">
 Register
</button>

</div>

<script src="app.js"></script>
</body>
</html>
